name: Firebase Deploy

on:
  push:
    branches:
      - develop
      - prod
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: firebase-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Enable Firebase web frameworks support
        run: npx firebase-tools experiments:enable webframeworks

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  deploy-dev:
    if: github.ref == 'refs/heads/develop'
    needs: validate
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Enable Firebase web frameworks support
        run: npx firebase-tools experiments:enable webframeworks

      - name: Deploy to Firebase dev project
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DEV }}
          projectId: ${{ secrets.FIREBASE_PROJECT_DEV }}
          channelId: live
          entryPoint: .

  deploy-prod:
    if: github.ref == 'refs/heads/prod'
    needs: validate
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Enable Firebase web frameworks support
        run: npx firebase-tools experiments:enable webframeworks

      - name: Deploy to Firebase prod project
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PROD }}
          projectId: ${{ secrets.FIREBASE_PROJECT_PROD }}
          channelId: live
          entryPoint: .
